version: '3.8'

services:
  opencode:
    build: .
    image: autoquantum:latest
    container_name: autoquantum
    # Use 'docker-compose run opencode web' for web UI
    user: "501:20"
    working_dir: /workspace/autoquantum
    environment:
      # Project configuration
      PROJECT_ROOT: /workspace/autoquantum
      LEAN_PROJECT_PATH: ${LEAN_PROJECT_PATH:-/workspace/autoquantum/lean}
      LEAN_TOOLS_REPO_ROOT: ${LEAN_TOOLS_REPO_ROOT:-/workspace/autoquantum}
      LEAN_TARGET: ${LEAN_TARGET:-AutoQuantum}
      # Model configuration (used in opencode.json.template)
      MODEL: ${MODEL:-deepseek/deepseek-reasoner}
      # OpenCode server settings (can be overridden)
      OPENCODE_HOST: ${OPENCODE_HOST:-0.0.0.0}
      OPENCODE_PORT: ${OPENCODE_PORT:-4096}
      # Optional HTTP basic auth for the OpenCode server
      # OPENCODE_SERVER_USERNAME: opencode
      # OPENCODE_SERVER_PASSWORD: ${OPENCODE_SERVER_PASSWORD:-}
      # AI provider API keys — set these in .env (gitignored), never commit values
      DEEPSEEK_API_KEY: ${DEEPSEEK_API_KEY:-}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
    volumes:
      # Mount the autoquantum project directory (host ./ to container /workspace/autoquantum)
      - ./:/workspace/autoquantum
      # Mount user's gitconfig (read‑only) for commit authorship
      - ~/.gitconfig:/home/opencode/.gitconfig:ro
      # Persistent caches for elan toolchains and Mathlib .oleans
      - elan-cache:/home/opencode/.elan
      - mathlib-cache:/home/opencode/.cache/lean
    ports:
      - "4096:4096"
      - "1455:1455"
    # Health check: run lake build (skip if lean/ doesn't exist yet)
    healthcheck:
      test: ["CMD", "bash", "-c", "if [ -d ${LEAN_PROJECT_PATH:-/workspace/autoquantum/lean} ]; then cd ${LEAN_PROJECT_PATH:-/workspace/autoquantum/lean} && lake build ${LEAN_TARGET:-AutoQuantum}; else exit 0; fi"]
      interval: 30s
      timeout: 60s
      retries: 3
      start_period: 20s
    # Keep the container running; OpenCode server stays alive
    restart: unless-stopped

volumes:
  elan-cache:
    name: autoquantum-elan-cache
  mathlib-cache:
    name: autoquantum-mathlib-cache
