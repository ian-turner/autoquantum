version: '3.8'

services:
  opencode:
    build: .
    image: autoquantum:latest
    container_name: autoquantum
    working_dir: /workspace/autoquantum
    environment:
      PROJECT_ROOT: /workspace/autoquantum
      LEAN_PROJECT_PATH: ${LEAN_PROJECT_PATH:-/workspace/autoquantum/lean}
      LEAN_TOOLS_REPO_ROOT: ${LEAN_TOOLS_REPO_ROOT:-/workspace/autoquantum}
      LEAN_TARGET: ${LEAN_TARGET:-AutoQuantum}
      AUTOQUANTUM_TOOLS_DIR: ${AUTOQUANTUM_TOOLS_DIR:-/home/opencode/.tools}
      DEEPSEEK_API_KEY: ${DEEPSEEK_API_KEY}
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY}
    volumes:
      - ./:/workspace/autoquantum
      - ~/.gitconfig:/home/opencode/.gitconfig:ro
      # Anonymous volume over .lake so Docker exposes the image's baked packages
      # rather than whatever is (or isn't) on the host at lean/.lake
      - /workspace/autoquantum/lean/.lake
    ports:
      - "4096:4096"
      - "1455:1455"
