version: '3.8'

services:
  opencode:
    build: .
    image: autoquantum:latest
    container_name: autoquantum
    working_dir: /workspace/autoquantum
    environment:
      DEEPSEEK_API_KEY: ${DEEPSEEK_API_KEY}
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY}
    volumes:
      - ./:/workspace/autoquantum
      # Anonymous volume over .lake so Docker exposes the image's baked packages
      # rather than whatever is (or isn't) on the host at lean/.lake
      - /workspace/autoquantum/lean/.lake
    ports:
      - "4096:4096"
      - "1455:1455"
