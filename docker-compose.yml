version: '3.8'

services:
  opencode:
    build: .
    image: autoquantum:latest
    container_name: autoquantum
    user: "501:20"
    working_dir: /workspace/autoquantum
    environment:
      # Lean project path (used by MCP servers)
      LEAN_PROJECT_PATH: /workspace/autoquantum/lean
      LEAN_TOOLS_REPO_ROOT: /workspace/autoquantum
      # OpenCode server settings (can be overridden)
      OPENCODE_HOST: 0.0.0.0
      OPENCODE_PORT: 4096
      # Optional HTTP basic auth for the OpenCode server
      # OPENCODE_SERVER_USERNAME: opencode
      # OPENCODE_SERVER_PASSWORD: ${OPENCODE_SERVER_PASSWORD:-}
      # AI provider API keys — set these in .env (gitignored), never commit values
      DEEPSEEK_API_KEY: ${DEEPSEEK_API_KEY:-}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      # Model selection — overrides opencode.json default (deepseek/deepseek-chat)
      OPENCODE_MODEL: ${OPENCODE_MODEL:-}
    volumes:
      # Mount the entire AutoQuantum repository
      - ./:/workspace/autoquantum
      # Mount user's gitconfig (read‑only) for commit authorship
      - ~/.gitconfig:/home/opencode/.gitconfig:ro
      # Persistent caches for elan toolchains and Mathlib .oleans
      - elan-cache:/home/opencode/.elan
      - mathlib-cache:/home/opencode/.cache/lean
    ports:
      - "4096:4096"
    # Health check: run lake build AutoQuantum (skip if lean/ doesn't exist yet)
    healthcheck:
      test: ["CMD", "bash", "-c", "if [ -d /workspace/autoquantum/lean ]; then cd /workspace/autoquantum/lean && lake build AutoQuantum; else exit 0; fi"]
      interval: 30s
      timeout: 60s
      retries: 3
      start_period: 20s
    # Keep the container running; OpenCode server stays alive
    restart: unless-stopped

volumes:
  elan-cache:
    name: autoquantum-elan-cache
  mathlib-cache:
    name: autoquantum-mathlib-cache