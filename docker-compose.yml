version: '3.8'

services:
  opencode:
    build: .
    image: autoquantum:latest
    container_name: autoquantum
    working_dir: /workspace/autoquantum
    entrypoint: ["./web.sh"] # optional: use the "web" version: 
#    entrypoint: ["./serve.sh"]
    environment:
      # Project configuration
      PROJECT_ROOT: /workspace/autoquantum
      LEAN_PROJECT_PATH: ${LEAN_PROJECT_PATH:-/workspace/autoquantum/lean}
      LEAN_TOOLS_REPO_ROOT: ${LEAN_TOOLS_REPO_ROOT:-/workspace/autoquantum}
      LEAN_TARGET: ${LEAN_TARGET:-AutoQuantum}
      DEEPSEEK_API_KEY: ${DEEPSEEK_API_KEY}
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY}
    volumes:
      # Mount the autoquantum project directory (host ./ to container /workspace/autoquantum)
      - ./:/workspace/autoquantum
      # Mount user's gitconfig (read‑only) for commit authorship
      - ~/.gitconfig:/home/opencode/.gitconfig:ro
      # Persistent caches for elan toolchains, Lean download artifacts, and Lake-managed dependencies
      - elan-cache:/home/opencode/.elan
      - lean-cache:/home/opencode/.cache
      - mathlib-cache:/workspace/autoquantum/lean/.lake/packages
    ports:
      - "4096:4096"
      - "1455:1455"

volumes:
  elan-cache:
    name: autoquantum-elan-cache
  lean-cache:
    name: autoquantum-lean-cache
  mathlib-cache:
    name: autoquantum-mathlib-cache
